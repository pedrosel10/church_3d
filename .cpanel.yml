---
deployment:
  tasks:
    # 1. Instala as dependências (certifique-se de que o Node.js está habilitado na hospedagem)
    - npm install
    
    # 2. Roda o build do Vite
    - npm run build
    
    # 3. Cria a pasta destino caso não exista
    - mkdir -p $HOME/public_html/church
    
    # 4. Copia os arquivos gerados na pasta 'dist' para a pasta pública do cPanel
    - /bin/cp -R dist/* $HOME/public_html/church/
